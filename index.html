<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatUP — JARVIS Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-void: #000005;
    --bg-deep: #020410;
    --bg-panel: rgba(4, 12, 40, 0.85);
    --bg-glass: rgba(6, 18, 60, 0.45);
    --neon-blue: #00d4ff;
    --neon-purple: #7b2fff;
    --neon-cyan: #00ffea;
    --neon-pink: #ff2dff;
    --accent-glow: #0088ff;
    --text-primary: #e0f4ff;
    --text-secondary: #7ab8d4;
    --text-dim: #3a6880;
    --border-glow: rgba(0, 212, 255, 0.25);
    --border-bright: rgba(0, 212, 255, 0.6);
    --shadow-blue: 0 0 20px rgba(0, 212, 255, 0.3);
    --shadow-purple: 0 0 20px rgba(123, 47, 255, 0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(var(--neon-purple), var(--neon-blue)); border-radius: 4px; }

  /* ── STARFIELD ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,60,120,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(60,0,120,0.12) 0%, transparent 50%),
                var(--bg-void);
  }
  #starfield::before, #starfield::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(0,212,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 30%, rgba(0,212,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(123,47,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 70%, rgba(0,212,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 85%, rgba(123,47,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 10%, rgba(0,255,234,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 92%, rgba(0,212,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 55%, rgba(255,45,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 40%, rgba(255,255,255,0.5) 0%, transparent 100%);
  }
  #starfield::after {
    animation: twinkle 4s infinite alternate;
    opacity: 0.6;
  }
  @keyframes twinkle {
    0% { opacity: 0.4; }
    50% { opacity: 0.8; }
    100% { opacity: 0.5; }
  }

  /* ── GRID OVERLAY ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── SCAN LINE ── */
  .scanline {
    position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 9999; pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
    animation: scan 6s linear infinite;
    opacity: 0.4;
  }
  @keyframes scan {
    0% { top: -2px; }
    100% { top: 100vh; }
  }

  /* ═══════════════════════════════════
     LOGIN SCREEN
  ═══════════════════════════════════ */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #login-screen.hidden {
    opacity: 0; transform: scale(1.05); pointer-events: none;
  }

  .login-container {
    position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
    padding: 60px 70px;
    background: var(--bg-glass);
    border: 1px solid var(--border-glow);
    border-radius: 4px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0,136,255,0.15), 0 0 120px rgba(123,47,255,0.1), inset 0 0 40px rgba(0,0,0,0.5);
  }
  .login-container::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(0,212,255,0.4), transparent 40%, transparent 60%, rgba(123,47,255,0.4));
    z-index: -1;
  }

  /* Corner brackets */
  .corner { position: absolute; width: 20px; height: 20px; }
  .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); }

  .login-logo {
    font-family: 'Orbitron', monospace;
    font-size: 52px; font-weight: 900; letter-spacing: 12px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
    animation: logo-pulse 3s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
    50% { filter: drop-shadow(0 0 35px rgba(0,212,255,0.9)) drop-shadow(0 0 60px rgba(123,47,255,0.4)); }
  }

  .login-tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 4px; color: var(--neon-cyan);
    text-transform: uppercase; opacity: 0.7;
    animation: blink-tag 2s steps(1) infinite;
  }
  @keyframes blink-tag {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.3; }
  }

  .login-separator {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
  }

  .status-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--neon-blue); letter-spacing: 2px;
    opacity: 0.6;
  }

  .google-btn {
    position: relative; display: flex; align-items: center; gap: 14px;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
  }
  .google-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,47,255,0.08));
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }
  .google-btn:hover::before { transform: translateX(0); }
  .google-btn:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,212,255,0.3), 0 0 40px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.05);
    color: var(--neon-cyan);
    transform: translateY(-1px);
  }
  .google-btn:active { transform: translateY(0); }
  .google-btn svg { flex-shrink: 0; }

  .login-ring {
    position: absolute; width: 300px; height: 300px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.08);
    animation: ring-spin 20s linear infinite;
    pointer-events: none;
  }
  .login-ring:nth-child(1) { animation-duration: 20s; }
  .login-ring:nth-child(2) { width: 400px; height: 400px; animation-duration: 30s; animation-direction: reverse; border-color: rgba(123,47,255,0.06); }
  .login-ring:nth-child(3) { width: 500px; height: 500px; animation-duration: 45s; border-color: rgba(0,255,234,0.04); }
  @keyframes ring-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .login-ring::before {
    content: '';
    position: absolute; width: 6px; height: 6px; background: var(--neon-blue);
    border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%);
    box-shadow: 0 0 8px var(--neon-blue), 0 0 16px var(--neon-blue);
  }

  /* ═══════════════════════════════════
     CHAT SCREEN
  ═══════════════════════════════════ */
  #chat-screen {
    position: fixed; inset: 0; z-index: 90;
    display: flex; flex-direction: column;
    opacity: 0; transform: scale(0.97);
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #chat-screen.active {
    opacity: 1; transform: scale(1); pointer-events: all;
  }

  /* ── HEADER ── */
  .chat-header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 64px;
    background: rgba(2, 8, 30, 0.9);
    border-bottom: 1px solid var(--border-glow);
    backdrop-filter: blur(20px);
    position: relative; z-index: 10;
  }
  .chat-header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), transparent);
    opacity: 0.5;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .header-logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 900; letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(0,212,255,0.5));
  }

  .header-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px; color: var(--neon-cyan);
    border: 1px solid rgba(0,255,234,0.3); padding: 2px 8px; border-radius: 2px;
    opacity: 0.7;
  }

  .header-center {
    display: flex; flex-direction: column; align-items: center;
  }
  .room-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px; letter-spacing: 4px; color: var(--text-secondary);
  }
  .online-indicator {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: #00ff88; letter-spacing: 1px; opacity: 0.8;
  }
  .online-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
    animation: dot-pulse 1.5s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 14px 5px 5px;
    background: rgba(0,212,255,0.07);
    border: 1px solid var(--border-glow);
    border-radius: 50px;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--neon-blue);
    box-shadow: 0 0 8px rgba(0,212,255,0.3);
    object-fit: cover;
  }
  .user-avatar-placeholder {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 12px; color: white;
    border: 1px solid var(--neon-blue);
    box-shadow: 0 0 8px rgba(0,212,255,0.3);
  }
  .user-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    letter-spacing: 1px; max-width: 120px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .logout-btn {
    background: transparent; border: 1px solid rgba(255,60,60,0.3);
    color: rgba(255,100,100,0.7); cursor: pointer;
    font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px;
    padding: 6px 14px; border-radius: 2px;
    transition: all 0.25s;
  }
  .logout-btn:hover {
    border-color: rgba(255,60,60,0.8); color: #ff6060;
    box-shadow: 0 0 12px rgba(255,60,60,0.2);
  }

  /* ── MESSAGES AREA ── */
  .messages-wrapper {
    flex: 1; overflow: hidden; position: relative;
  }

  #messages-container {
    height: 100%; overflow-y: auto; overflow-x: hidden;
    padding: 24px 24px 16px;
    display: flex; flex-direction: column; gap: 4px;
    scroll-behavior: smooth;
  }

  /* Date divider */
  .date-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0; opacity: 0.5;
  }
  .date-divider span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
    white-space: nowrap;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-glow));
  }
  .date-divider::after {
    background: linear-gradient(90deg, var(--border-glow), transparent);
  }

  /* Message bubble */
  .msg {
    display: flex; align-items: flex-end; gap: 10px;
    max-width: 72%; animation: msg-in 0.3s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.own { align-self: flex-end; flex-direction: row-reverse; }
  .msg.other { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid var(--border-glow);
    box-shadow: 0 0 6px rgba(0,212,255,0.2);
    object-fit: cover;
  }
  .msg-avatar-placeholder {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 10px; color: white;
    border: 1px solid var(--border-glow);
    box-shadow: 0 0 6px rgba(0,212,255,0.2);
  }

  .msg-body { display: flex; flex-direction: column; gap: 3px; }

  .msg-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 1px; color: var(--text-dim);
    padding: 0 4px;
  }
  .msg.own .msg-meta { text-align: right; }

  .msg-bubble {
    padding: 10px 16px;
    border-radius: 2px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 400; line-height: 1.5;
    word-break: break-word;
    position: relative;
  }

  .msg.other .msg-bubble {
    background: rgba(4, 16, 50, 0.85);
    border: 1px solid var(--border-glow);
    color: var(--text-primary);
    border-radius: 0 8px 8px 8px;
    box-shadow: 0 0 12px rgba(0,136,255,0.08);
  }

  .msg.own .msg-bubble {
    background: linear-gradient(135deg, rgba(0, 100, 200, 0.25), rgba(80, 0, 180, 0.2));
    border: 1px solid rgba(0,212,255,0.35);
    color: var(--text-primary);
    border-radius: 8px 0 8px 8px;
    box-shadow: 0 0 15px rgba(0,136,255,0.15), inset 0 0 10px rgba(0,212,255,0.04);
  }

  .msg-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: var(--text-dim); align-self: flex-end;
    padding: 0 2px;
  }

  /* System message */
  .system-msg {
    text-align: center; padding: 6px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; opacity: 0.5;
  }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; opacity: 0.3;
  }
  .empty-icon {
    width: 60px; height: 60px;
    border: 1px solid var(--neon-blue); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: empty-pulse 2s ease infinite;
  }
  @keyframes empty-pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    50% { box-shadow: 0 0 25px rgba(0,212,255,0.5); }
  }
  .empty-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 3px; color: var(--neon-blue);
  }

  /* ── INPUT BAR ── */
  .chat-input-bar {
    flex-shrink: 0;
    padding: 16px 24px;
    background: rgba(2, 6, 24, 0.95);
    border-top: 1px solid var(--border-glow);
    backdrop-filter: blur(20px);
    position: relative; z-index: 10;
  }
  .chat-input-bar::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-blue), var(--neon-cyan), var(--neon-blue), var(--neon-purple), transparent);
    opacity: 0.4;
  }

  .input-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(4, 14, 50, 0.8);
    border: 1px solid var(--border-glow);
    border-radius: 4px;
    padding: 8px 8px 8px 20px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .input-row:focus-within {
    border-color: var(--neon-blue);
    box-shadow: 0 0 20px rgba(0,212,255,0.15), 0 0 40px rgba(0,212,255,0.05);
  }

  #msg-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 400;
    letter-spacing: 0.5px; line-height: 1.4;
    resize: none; max-height: 100px; min-height: 22px;
  }
  #msg-input::placeholder { color: var(--text-dim); font-size: 14px; letter-spacing: 1px; }

  .input-actions { display: flex; align-items: center; gap: 8px; }

  .char-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim); letter-spacing: 1px; min-width: 36px; text-align: right;
  }

  .send-btn {
    width: 40px; height: 40px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    border: none; border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(123,47,255,0.3);
  }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { position: relative; z-index: 1; }

  /* ── LOADING ── */
  .loading-msgs {
    display: flex; align-items: center; gap: 10px;
    padding: 16px; opacity: 0.5;
  }
  .loading-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon-blue);
    animation: loading-bounce 0.8s ease infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.15s; background: var(--neon-cyan); }
  .loading-dot:nth-child(3) { animation-delay: 0.3s; background: var(--neon-purple); }
  @keyframes loading-bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(4,14,50,0.95); border: 1px solid var(--border-bright);
    color: var(--neon-cyan); padding: 10px 24px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px;
    border-radius: 2px; z-index: 9999;
    opacity: 0; pointer-events: none;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .login-container { padding: 40px 28px; }
    .login-logo { font-size: 38px; letter-spacing: 8px; }
    .header-center { display: none; }
    .header-badge { display: none; }
    .msg { max-width: 88%; }
    #messages-container { padding: 16px 12px 12px; }
    .chat-input-bar { padding: 12px; }
  }
</style>
</head>
<body>

<div id="starfield"></div>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div id="toast"></div>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-ring"></div>
  <div class="login-ring"></div>
  <div class="login-ring"></div>

  <div class="login-container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="login-logo">ChatUP</div>
    <div class="login-tagline">[ SECURE COMMUNICATION MATRIX v2.0 ]</div>
    <div class="login-separator"></div>
    <div class="status-line" id="status-line">AWAITING AUTHENTICATION...</div>

    <button class="google-btn" id="google-login-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      AUTHENTICATE WITH GOOGLE
    </button>
  </div>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chat-screen">
  <header class="chat-header">
    <div class="header-left">
      <div class="header-logo">ChatUP</div>
      <div class="header-badge">LIVE</div>
    </div>
    <div class="header-center">
      <div class="room-name">GLOBAL NEXUS</div>
      <div class="online-indicator">
        <div class="online-dot"></div>
        <span id="online-count">CONNECTED</span>
      </div>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar-placeholder" id="user-avatar-container">?</div>
        <span class="user-name" id="user-display-name">USER</span>
      </div>
      <button class="logout-btn" id="logout-btn">[ EXIT ]</button>
    </div>
  </header>

  <div class="messages-wrapper">
    <div id="messages-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--neon-blue)">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <div class="empty-text">NO TRANSMISSIONS YET</div>
      </div>
    </div>
  </div>

  <div class="chat-input-bar">
    <div class="input-row">
      <textarea id="msg-input" placeholder="TRANSMIT MESSAGE..." rows="1" maxlength="500"></textarea>
      <div class="input-actions">
        <span class="char-counter" id="char-counter">500</span>
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  /* ─────────────────────────────────────
     ⚙️  CONFIGURE YOUR FIREBASE & BACKEND
  ──────────────────────────────────────*/
  const FIREBASE_CONFIG = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  const BACKEND_URL = "https://your-render-app.onrender.com"; // or http://localhost:5000 for dev

  /* ─── Init Firebase ─── */
  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  /* ─── DOM ─── */
  const loginScreen   = document.getElementById("login-screen");
  const chatScreen    = document.getElementById("chat-screen");
  const loginBtn      = document.getElementById("google-login-btn");
  const logoutBtn     = document.getElementById("logout-btn");
  const msgInput      = document.getElementById("msg-input");
  const sendBtn       = document.getElementById("send-btn");
  const msgContainer  = document.getElementById("messages-container");
  const emptyState    = document.getElementById("empty-state");
  const userNameEl    = document.getElementById("user-display-name");
  const userAvatarEl  = document.getElementById("user-avatar-container");
  const charCounter   = document.getElementById("char-counter");
  const statusLine    = document.getElementById("status-line");

  let currentUser  = null;
  let pollInterval = null;
  let lastMsgId    = null;
  let renderedIds  = new Set();

  /* ─── TOAST ─── */
  function toast(msg, duration = 2500) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  /* ─── AUTH STATE ─── */
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      enterChat(user);
    } else {
      currentUser = null;
      exitChat();
    }
  });

  /* ─── LOGIN ─── */
  loginBtn.addEventListener("click", async () => {
    statusLine.textContent = "ESTABLISHING SECURE LINK...";
    loginBtn.disabled = true;
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      statusLine.textContent = "AUTHENTICATION FAILED. RETRY.";
      loginBtn.disabled = false;
      toast("AUTH FAILED: " + e.code);
    }
  });

  /* ─── LOGOUT ─── */
  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    toast("SESSION TERMINATED");
  });

  /* ─── ENTER CHAT ─── */
  function enterChat(user) {
    loginScreen.classList.add("hidden");
    chatScreen.classList.add("active");

    // Set user info
    userNameEl.textContent = user.displayName?.split(" ")[0]?.toUpperCase() || "USER";
    if (user.photoURL) {
      userAvatarEl.innerHTML = `<img class="user-avatar" src="${user.photoURL}" alt="avatar" referrerpolicy="no-referrer">`;
    } else {
      userAvatarEl.textContent = (user.displayName || "U")[0].toUpperCase();
    }

    loadMessages();
    pollInterval = setInterval(loadMessages, 2500);
  }

  /* ─── EXIT CHAT ─── */
  function exitChat() {
    loginScreen.classList.remove("hidden");
    chatScreen.classList.remove("active");
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    renderedIds.clear();
    lastMsgId = null;
    msgContainer.innerHTML = `<div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--neon-blue)">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      <div class="empty-text">NO TRANSMISSIONS YET</div>
    </div>`;
    statusLine.textContent = "AWAITING AUTHENTICATION...";
    loginBtn.disabled = false;
  }

  /* ─── FETCH MESSAGES ─── */
  async function loadMessages() {
    try {
      const url = lastMsgId
        ? `${BACKEND_URL}/api/messages?after=${lastMsgId}`
        : `${BACKEND_URL}/api/messages`;
      const res  = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      if (data.messages?.length) {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
        data.messages.forEach(renderMessage);
      }
    } catch (_) {}
  }

  /* ─── RENDER MESSAGE ─── */
  function renderMessage(msg) {
    if (renderedIds.has(msg.id)) return;
    renderedIds.add(msg.id);
    lastMsgId = msg.id;

    const isOwn   = msg.uid === currentUser?.uid;
    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const initial = (msg.display_name || "U")[0].toUpperCase();
    const avatarHTML = msg.photo_url
      ? `<img class="msg-avatar" src="${msg.photo_url}" referrerpolicy="no-referrer" alt="av">`
      : `<div class="msg-avatar-placeholder">${initial}</div>`;

    const div = document.createElement("div");
    div.className = `msg ${isOwn ? "own" : "other"}`;
    div.innerHTML = `
      ${avatarHTML}
      <div class="msg-body">
        ${!isOwn ? `<div class="msg-meta">${escapeHtml(msg.display_name || "UNKNOWN")}</div>` : ""}
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        <div class="msg-time">${timeStr}</div>
      </div>`;

    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  /* ─── SEND ─── */
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentUser) return;

    msgInput.value = "";
    charCounter.textContent = "500";
    autoResize();

    try {
      const idToken = await currentUser.getIdToken();
      const res = await fetch(`${BACKEND_URL}/api/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${idToken}` },
        body: JSON.stringify({ text })
      });
      if (!res.ok) toast("TRANSMISSION FAILED");
      else await loadMessages();
    } catch (_) {
      toast("NETWORK ERROR");
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  msgInput.addEventListener("input", () => {
    const remaining = 500 - msgInput.value.length;
    charCounter.textContent = remaining;
    charCounter.style.color = remaining < 50 ? "rgba(255,80,80,0.8)" : "var(--text-dim)";
    autoResize();
  });

  function autoResize() {
    msgInput.style.height = "22px";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + "px";
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
              .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }
</script>
</body>
</html>
